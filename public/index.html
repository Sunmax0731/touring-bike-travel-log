<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ツーリング・バイク・旅行ログ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <p>AndroidApp / Rank 84</p>
    <h1>ツーリング・バイク・旅行ログ</h1>
    <p>散歩、徒歩圏、ツーリング、旅行、持ち物、郵便、給油、整備、点検メモを位置と日付でまとめる。</p>
  </header>
  <main id="closed-alpha-preview">
    <section>
      <h2>Closed Alpha Focus</h2>
      <p>バイクや外出の前後で必要な準備、記録、整備メモを1つのログにする。</p>
    </section>
    <section>
      <h2>Required Fields</h2>
      <ul>
<li><code>id</code></li>
<li><code>title</code></li>
<li><code>tripDate</code></li>
<li><code>routeName</code></li>
<li><code>maintenanceStatus</code></li>
<li><code>owner</code></li>
      </ul>
    </section>
    <section id="app"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
